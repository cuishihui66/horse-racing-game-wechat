<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛马摇一摇 - 大屏舞台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="screen-shell" class="screen-shell" data-stage="idle">
        <div id="barrage-layer" class="barrage-layer"></div>

        <section id="join-stage" class="stage join-stage">
            <div class="join-backdrop"></div>
            <div class="join-panel">
                <p class="eyebrow">HORSE RACE LIVE</p>
                <h1 id="join-title" class="join-title">等待主持人创建游戏</h1>
                <p class="join-description">主持人创建游戏后，大屏会显示专属二维码。参与者扫码进入小程序，即可加入本场互动赛马。</p>
                <div class="join-meta">
                    <span id="join-status-pill" class="status-pill">待命</span>
                    <span id="join-count-pill" class="meta-pill">0 人已加入</span>
                </div>
            </div>
            <div class="join-qr-shell">
                <div class="qr-frame">
                    <img id="join-qr-image" src="" alt="参与二维码">
                </div>
                <p class="qr-caption">微信扫码参与游戏</p>
            </div>
        </section>

        <section id="race-stage" class="stage race-stage">
            <div class="race-backdrop"></div>
            <header class="race-header">
                <div>
                    <p class="eyebrow">RACE IN PROGRESS</p>
                    <h1 id="race-title" class="race-title">赛马摇一摇</h1>
                </div>
                <div class="race-metrics">
                    <div class="metric-pill">
                        <span class="metric-label">参赛人数</span>
                        <strong id="race-participant-count">0</strong>
                    </div>
                    <div class="metric-pill">
                        <span class="metric-label">已冲线</span>
                        <strong id="race-finished-count">0</strong>
                    </div>
                    <div class="metric-pill">
                        <span class="metric-label">目标</span>
                        <strong id="race-finish-limit">TOP 5</strong>
                    </div>
                </div>
            </header>

            <div class="track-shell">
                <div class="track-markers">
                    <span>START</span>
                    <span>FINISH</span>
                </div>
                <div id="track-lanes" class="track-lanes"></div>
            </div>
        </section>

        <section id="result-stage" class="stage result-stage">
            <div class="result-backdrop"></div>
            <div class="result-card">
                <p class="eyebrow">RACE RESULT</p>
                <h1 id="result-title" class="result-title">冠军诞生</h1>
                <p class="result-subtitle">本场比赛前三名与前五榜单</p>

                <div id="podium-list" class="podium-list"></div>

                <div class="final-board">
                    <div class="final-board-head">
                        <h2>前五排名</h2>
                    </div>
                    <div id="final-ranking-list" class="final-ranking-list"></div>
                </div>
            </div>
        </section>

        <div id="countdown-overlay" class="countdown-overlay hidden">
            <div class="countdown-card">
                <p>比赛即将开始</p>
                <span id="countdown-number">3</span>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
